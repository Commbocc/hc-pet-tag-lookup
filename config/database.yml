# SQLite version 3.x
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
default: &default
  adapter: sqlserver
  pool: 5
  timeout: 5000
  host: <%= ENV['ANIMAL_DB_SERVER'] %>
  username: <%= ENV['ANIMAL_DB_USER'] %>
  password: <%= ENV['ANIMAL_DB_PASS'] %>
  database: <%= ENV['ANIMAL_DB_DB'] %>

development:
  <<: *default

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  adapter: sqlite3
  pool: 5
  timeout: 5000
  database: db/test.sqlite3

production:
  <<: *default
